<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — MODUM</title>
    
    <!-- Шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Дополнительные стили для профиля */
        .profile {
            margin: 40px 0;
        }
        
        .profile-cover {
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px 20px 0 0;
        }
        
        .profile-info {
            background: white;
            border-radius: 20px;
            padding: 0 40px 40px;
            margin-top: -60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .profile-avatar {
            position: relative;
            top: -40px;
            margin-bottom: -20px;
        }
        
        .avatar-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #999;
        }
        
        .edit-name-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 15px;
        }
        
        .edit-name-btn:hover {
            background: #f0f0f0;
        }
        
        .profile-name {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .profile-id {
            font-size: 14px;
            color: #999;
            margin-bottom: 5px;
        }
        
        .profile-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .profile-link:hover {
            text-decoration: underline;
        }
        
        .profile-badge {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .profile-titul {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: black;
            color: white;
            font-weight: 600;
            border-radius: 30px;
        }
        
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s;
            border: 1px solid #e9ecef;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            font-size: 28px;
            color: black;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
        }
        
        .tituls-section,
        .history-section,
        .rating-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .tituls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 30px;
        }
        
        .titul-card {
            border: 1px solid #e9ecef;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .titul-card.current {
            background: black;
            color: white;
            border-color: black;
        }
        
        .titul-icon {
            width: 60px;
            height: 60px;
            background: #f8f9fa;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 20px;
        }
        
        .titul-card.current .titul-icon {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .titul-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .titul-points {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        
        .titul-progress-bar {
            height: 6px;
            background: #e9ecef;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .titul-progress-fill {
            height: 100%;
            background: black;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .titul-card.current .titul-progress-fill {
            background: white;
        }
        
        .titul-next {
            font-size: 13px;
            color: #999;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s;
        }
        
        .history-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }
        
        .history-icon {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 20px;
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .history-meta {
            display: flex;
            gap: 20px;
            color: #666;
            font-size: 13px;
        }
        
        .history-points {
            font-weight: 700;
            color: black;
        }
        
        .rating-position {
            display: flex;
            align-items: center;
            gap: 30px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 16px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .rating-rank {
            width: 100px;
            height: 100px;
            background: black;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
        }
        
        .rating-info {
            flex: 1;
            min-width: 250px;
        }
        
        .rating-label {
            color: #999;
            margin-bottom: 5px;
        }
        
        .rating-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .rating-progress-bar {
            height: 8px;
            background: #dee2e6;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .rating-progress-fill {
            height: 100%;
            background: black;
        }
        
        @media (max-width: 768px) {
            .profile-info {
                padding: 0 20px 20px;
            }
            .profile-name {
                font-size: 28px;
            }
            .profile-stats {
                grid-template-columns: 1fr;
            }
            .tituls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <!-- Шапка -->
        <header class="header">
            <div class="container">
                <div class="header__inner">
                    <a href="index.html" class="logo">MODUM</a>
                    <nav class="nav">
                        <a href="index.html" class="nav__link">Главная</a>
                        <a href="editions.html" class="nav__link">Выпуски</a>
                        <a href="profile.html" class="nav__link active">Профиль</a>
                        <a href="about.html" class="nav__link">О системе</a>
                        <a href="admin.html" class="nav__link" id="adminLink" style="display: none;">Админка</a>
                    </nav>
                    <div class="user-info" id="userInfo"></div>
                </div>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="main">
            <div class="container">
                <div id="profileContainer">
                    <!-- Скелетон загрузки -->
                    <div class="profile" id="loadingSkeleton">
                        <div class="profile-cover"></div>
                        <div class="profile-info">
                            <div class="profile-avatar">
                                <div class="avatar-image skeleton-circle"></div>
                            </div>
                            <div class="profile-name">
                                <div class="skeleton-text" style="width: 200px; height: 36px;"></div>
                            </div>
                            <div class="profile-id skeleton-text" style="width: 150px;"></div>
                            <div class="profile-id skeleton-text" style="width: 150px;"></div>
                            <div class="profile-link skeleton-text" style="width: 200px;"></div>
                            <div class="profile-badge">
                                <div class="skeleton-text" style="width: 120px; height: 40px;"></div>
                            </div>
                            <div class="profile-stats">
                                <div class="stat-card skeleton-card"></div>
                                <div class="stat-card skeleton-card"></div>
                                <div class="stat-card skeleton-card"></div>
                                <div class="stat-card skeleton-card"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Подвал -->
        <footer class="footer">
            <div class="container">
                <div class="footer__links">
                    <a href="https://vk.com/modumava" class="footer__link" target="_blank">MODUM. Журнал игры Аватария</a>
                    <a href="https://vk.com/avataryaclub" class="footer__link" target="_blank">Официальное сообщество Аватарии</a>
                </div>
                <div class="footer__copyright">© 2026 MODUM. Все права защищены.</div>
            </div>
        </footer>
    </div>

    <!-- Скрипты -->
    <script src="js/config.js"></script>
    <script src="js/google-api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/profanity.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
